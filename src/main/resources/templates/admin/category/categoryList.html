<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh mục</title>
    <th:block th:replace="~{admin/common/header :: header}"></th:block>
</head>
<body class="no-skin" style="font-family: 'Abel', sans-serif;">
<div class="main-container" id="main-container">
    <script type="text/javascript">
        try {
            ace.settings.check('main-container', 'fixed')
        } catch (e) {
        }
    </script>
    <th:block th:replace="~{admin/common/sidebar :: sidebar}"></th:block>
    <div class="main-content">
        <div class="main-content-inner">
            <div class="breadcrumbs" id="breadcrumbs">
                <script type="text/javascript">
                    try {
                        ace.settings.check('breadcrumbs', 'fixed')
                    } catch (e) {
                    }
                </script>

                <ul class="breadcrumb">
                    <li>
                        <i class="ace-icon fa fa-home home-icon"></i>
                        <a href="#">Home</a>
                    </li>
                    <li class="active">Dashboard</li>
                </ul><!-- /.breadcrumb -->

                <!-- <div class="nav-search" id="nav-search">
                    <form class="form-search">
                        <span class="input-icon">
                            <input type="text" placeholder="Search ..." class="nav-search-input"
                                id="nav-search-input" autocomplete="off" />
                            <i class="ace-icon fa fa-search nav-search-icon"></i>
                        </span>
                    </form>
                </div> -->
            </div>

            <div class="page-content">
                <div class="page-header">
                    <h1>
                        Danh sách danh mục
                    </h1>
                    <div class="clearfix" style="margin-top: 15px;">
                        <div class="pull-left">
                            <button type="button" class="btn btn-success">
                                <i class="ace-icon fa fa-plus"></i>
                                Thêm danh mục
                            </button>

                            <button type="button" class="btn btn-danger">
                                <i class="ace-icon fa fa-trash"></i>
                                Xóa danh mục
                            </button>
                        </div>
                    </div>
                </div><!-- /.page-header -->
                <div class="row">
                    <div class="col-xs-12">
                        <table id="categoryList" class="table table-striped table-bordered table-hover">
                            <thead>
                            <tr>
                                <th class="center">
                                    <label class="pos-rel">
                                        <input type="checkbox" class="ace">
                                        <span class="lbl"></span>
                                    </label>
                                </th>
                                <th>Tên danh mục</th>
                                <th>Số lượng sản phẩm</th>
                                <th>Trạng thái</th>
                                <th>Ngày tạo</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="category : ${categoryList}">
                                <td class="center">
                                    <label class="pos-rel">
                                        <input type="checkbox" class="ace" th:value="${category.id}">
                                        <span class="lbl"></span>
                                    </label>
                                </td>
                                <td th:text="${category.name}"></td>
                                <td>$45</td>
                                <td th:text="${category.status}"></td>
                                <td th:text="${category.createdDate}"></td>
                                <td>
                                    <div class="hidden-sm hidden-xs btn-group">
                                        <button class="btn btn-xs btn-info" title="Sửa tên danh mục">
                                            <i class="fa fa-pencil-square-o"></i>
                                        </button>

                                        <button class="btn btn-xs btn-danger" title="Xóa danh mục">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div><!-- /.row -->
            </div><!-- /.page-content -->
        </div>
    </div><!-- /.main-content -->

    <div class="footer">
        <div class="footer-inner">
            <div class="footer-content">
					<span class="bigger-120">
						&copy; 2026 <strong>E-Commerce Management System</strong>.
					</span>
            </div>
        </div>
    </div>

    <a href="#" id="btn-scroll-up" class="btn-scroll-up btn btn-sm btn-inverse">
        <i class="ace-icon fa fa-angle-double-up icon-only bigger-110"></i>
    </a>
</div><!-- /.main-container -->
<th:block th:replace="~{admin/common/common-scripts :: jquery}"></th:block>
</body>
</html>
